services:
  backend:
    build:
      context: ./backend
    ports:
      - 8000:8000
    env_file:
      - .env
    volumes:
      - ./backend:/backend
    command: >
      sh -c "python manage.py migrate && \
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      postgres-db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/frontend
      - ./backend:/backend:ro
      - /frontend/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    depends_on:
      - backend

  postgres-db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trade_credit_app_user} -d ${POSTGRES_DB:-trade_credit_app_db}" ]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
