components:
  schemas:
    CreditCase:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
          description: |-
            Credit case status like missing docs, pending ai verdict, etc. Items are in order of sequence.

            * `missing_documents` - Missing Documents
            * `pending_ai_verdict` - Pending AI Verdict
            * `buro_de_credito_rejected` - Buro De Credito Rejected
            * `pending_final_verdict` - Pending Final Verdict
            * `complete` - Complete
        verdict:
          allOf:
          - $ref: '#/components/schemas/VerdictEnum'
          readOnly: true
          description: |-
            Credit case status like pending, approved, rejected. Items are in order of sequence.

            * `pending` - Pending
            * `approved` - Approved
            * `rejected` - Rejected
        requested_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,30}(?:\.\d{0,2})?$
          description: Requested credit line amount.
        currency:
          allOf:
          - $ref: '#/components/schemas/CurrencyEnum'
          description: |-
            Currency for the requested credit line amount.

            * `MXN` - MXN
        requested_term_days:
          allOf:
          - $ref: '#/components/schemas/RequestedTermDaysEnum'
          description: |-
            Requested net terms (days).

            * `15` - 15 days
            * `30` - 30 days
            * `45` - 45 days
            * `60` - 60 days
            * `90` - 90 days
          minimum: -2147483648
          maximum: 2147483647
        created_at:
          type: string
          format: date-time
          readOnly: true
        submitted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Submitted for human approval timestamp.
        verdict_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Final verdict timestamp after human review.
        customer:
          type: string
          format: uri
        organization:
          type: string
          format: uri
          readOnly: true
      required:
      - created_at
      - customer
      - id
      - organization
      - requested_term_days
      - status
      - submitted_at
      - url
      - verdict
      - verdict_at
    CurrencyEnum:
      enum:
      - MXN
      type: string
      description: '* `MXN` - MXN'
    Customer:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Customer name.
          maxLength: 100
        legal_name:
          type: string
          readOnly: true
          nullable: true
          description: Customer legal name recognized by government.
        rfc:
          type: string
          readOnly: true
          nullable: true
          description: Registro Federal de Contribuyentes for customer.
        type:
          readOnly: true
          nullable: true
          description: |-
            Persona moral o fisica.

            * `fisica` - Persona física
            * `moral` - Persona moral
          oneOf:
          - $ref: '#/components/schemas/TypeEnum'
          - $ref: '#/components/schemas/NullEnum'
        nombre_de_vialidad:
          type: string
          readOnly: true
          nullable: true
          description: Nombre de la calle, avenida, etc.
        codigo_postal:
          type: string
          readOnly: true
          nullable: true
          description: Zip code.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        organization:
          type: string
          format: uri
          readOnly: true
          description: User's Organization that created this customer record.
        created_by:
          type: string
          format: uri
          readOnly: true
          nullable: true
          description: User that created this customer record.
        customer_contacts:
          type: array
          items:
            type: string
            format: uri
          readOnly: true
      required:
      - codigo_postal
      - created_at
      - created_by
      - customer_contacts
      - id
      - legal_name
      - name
      - nombre_de_vialidad
      - organization
      - rfc
      - type
      - updated_at
      - url
    CustomerContact:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          nullable: true
          description: Contact first name.
          maxLength: 100
        last_name:
          type: string
          nullable: true
          description: Contact last name.
          maxLength: 100
        email:
          type: string
          format: email
          description: Contact email address.
          maxLength: 254
        phone_number:
          type: string
          nullable: true
          description: Contact phone number.
          maxLength: 128
        role:
          type: string
          nullable: true
          description: Contact role or position within the customer organization.
          maxLength: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          format: uri
          readOnly: true
          nullable: true
          description: User that created this customer record.
        customer:
          type: string
          format: uri
          description: The customer this contact belongs to.
        organization:
          type: string
          format: uri
          readOnly: true
          nullable: true
          description: User's Organization that created this customer contact record.
      required:
      - created_at
      - created_by
      - customer
      - email
      - id
      - organization
      - updated_at
      - url
    DocumentDataExtract:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        raw_json:
          readOnly: true
          nullable: true
          description: the raw json data extracted from the document using AI. Pydantic
            models can be used to parse this data into more structured formats if
            desired.
        confidence_score:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: a confidence score between 0 and 1 indicating the AI's confidence
            in the extracted data.
        model_version:
          readOnly: true
          nullable: true
          description: |-
            the version of the AI model used for extraction, if applicable.

            * `gpt-5-nano` - GPT-5 Nano
          oneOf:
          - $ref: '#/components/schemas/ModelVersionEnum'
          - $ref: '#/components/schemas/NullEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        upload_document:
          type: string
          format: uri
          readOnly: true
      required:
      - confidence_score
      - created_at
      - id
      - model_version
      - raw_json
      - upload_document
      - url
    FileTypeNameEnum:
      enum:
      - unknown
      - cashflow_statement
      type: string
      description: |-
